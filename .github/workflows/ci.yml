name: CI/CD Hospital Spring Boot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ⚠️ MUY IMPORTANTE: Estos permisos son necesarios para que la acción
    # de 'dorny/test-reporter' pueda escribir en la pestaña "Checks" de GitHub.
    permissions:
      contents: write
      actions: read
      checks: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Actualizado a JDK 21 según el README
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos a mvnw
        run: chmod +x mvnw

      - name: Compilar el proyecto
        run: ./mvnw compile --no-transfer-progress

      # Al ejecutar verify se lanzan surefire (unitarios) y failsafe (integración IT)
      - name: Ejecutar pruebas
        run: ./mvnw verify --no-transfer-progress

      # 2. Publicar el informe en la pestaña "Checks"
      - name: Reporte de Pruebas (dorny)
        uses: dorny/test-reporter@v1
        if: success() || failure() # Ejecuta este paso aunque los tests fallen
        with:
          name: Resultados de Pruebas Maven
          path: 'target/*-reports/TEST-*.xml' # Lee la carpeta surefire y failsafe
          reporter: java-junit

      # 3. Subir los XML como artefacto descargable (retención de 7 días)
      - name: Subir reportes XML de tests
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-reports-xml
          path: 'target/*-reports/TEST-*.xml'
          retention-days: 7

      # 4. Generar Badge de Cobertura con Jacoco
      - name: Generar Jacoco Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv

      # 5. Hacer commit del badge al repositorio (para que el README pueda mostrarlo)
      - name: Commit del Jacoco Badge
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .github/badges/jacoco.svg
          git commit -m "Actualizar badge de cobertura Jacoco" || echo "No hay cambios en el badge"
          git push